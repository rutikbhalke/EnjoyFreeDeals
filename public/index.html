<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnjoyFreeDeals API</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f7faf7;
      color: #172016;
    }
    main {
      width: min(680px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #dce7dc;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(20, 45, 20, 0.12);
    }
    h1 {
      margin: 0 0 10px;
      color: #087b33;
      font-size: 30px;
    }
    p {
      line-height: 1.5;
      color: #4b5a4d;
    }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 6px;
      background: #087b33;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>EnjoyFreeDeals API</h1>
    <p>The backend deployment is live. Android and web clients should use the API routes under <strong>/api</strong>.</p>
    <a href="/api/health">Check API Health</a>
  </main>
</body>
</html>
